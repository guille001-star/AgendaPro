<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
    /* FIX GLOBAL: Texto negro por defecto, blanco solo en fondos oscuros */
    body { color: #1e293b !important; background-color: #f8fafc !important; }
    .bg-slate-800, .bg-slate-900, header, footer { color: white !important; background-color: #0f172a !important; }
    /* Asegura que los inputs se vean */
    input, select, textarea { color: #1e293b !important; background-color: white !important; border: 1px solid #cbd5e1 !important; }
</style></head>
<body class="bg-gray-100 min-h-screen">
    
    <!-- MENSAJE DE ÉXITO GRANDE Y FIJO -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="fixed top-0 inset-x-0 z-50 p-4 flex justify-center pointer-events-none">
                {% for category, message in messages %}
                    {% if category == 'success' %}
                        <div id="success-banner" class="bg-green-600 text-white px-8 py-4 rounded-xl shadow-2xl text-xl font-bold flex items-center gap-3 pointer-events-auto border-4 border-green-400">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            <span>{{ message }}</span>
                        </div>
                    {% else %}
                        <div class="bg-red-200 border-l-4 border-red-500 text-red-700 p-4 rounded shadow mb-2 pointer-events-auto">
                            <p>{{ message }}</p>
                        </div>
                    {% endif %}
                {% endfor %}
            </div>
            <script>
                // Ocultar el mensaje de éxito después de 5 segundos
                setTimeout(() => {
                    const banner = document.getElementById('success-banner');
                    if(banner) banner.style.display = 'none';
                }, 5000);
            </script>
        {% endif %}
    {% endwith %}

    <div class="container mx-auto p-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
