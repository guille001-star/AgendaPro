{% extends "base.html" %}
{% block content %}
<div class="bg-slate-800 text-white py-12 text-center">
    <h1 class="text-4xl font-bold">{{ professional.name }}</h1>
    <p class="text-slate-300 mt-2">Selecciona un día.</p>
</div>
<div class="container mx-auto p-6 grid md:grid-cols-3 gap-6">
    {% for d in enabled_dates %}
    <a href="{{ url_for('public.agenda', slug=professional.slug) }}?d={{ d }}" 
       class="bg-white p-6 rounded-xl shadow hover:shadow-xl transition block text-center">
        <h2 class="text-xl font-bold text-slate-800">{{ d.strftime('%d/%m') }}</h2>
        <p class="text-slate-500 text-sm mt-1">{{ d.strftime('%A') }}</p>
        <div class="mt-4 text-indigo-600 font-semibold text-sm">Ver turnos →</div>
    </a>
    {% else %}
    <p class="col-span-3 text-center text-gray-400">No hay fechas disponibles.</p>
    {% endfor %}
</div>

<form id="reserva-form" method="POST" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow mt-6">
    <input type="hidden" name="date" id="res-date">
    <input type="hidden" name="time_slot" id="res-time">
    <h2 class="text-xl font-bold mb-4">Reservar</h2>
    <div class="space-y-3">
        <input type="text" name="name" placeholder="Nombre" required class="w-full border p-2 rounded">
        <input type="email" name="email" placeholder="Email" required class="w-full border p-2 rounded">
        <input type="tel" name="phone" placeholder="Teléfono" required class="w-full border p-2 rounded">
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold mt-4">Confirmar</button>
</form>

<script>
    const params = new URLSearchParams(window.location.search);
    const d = params.get('d');
    if(d) loadSlots(d);

    function loadSlots(dateStr) {
        document.getElementById('reserva-form').classList.remove('hidden');
        document.getElementById('res-date').value = dateStr;
        
        fetch(`/agenda/get-slots/{{ professional.slug }}/${dateStr}`)
        .then(r => r.json())
        .then(data => {
            const c = document.createElement('div');
            c.className = 'grid grid-cols-3 gap-2 mb-4';
            
            if(data.slots && data.slots.length > 0){
                data.slots.forEach(s => {
                    let t = typeof s === 'string' ? s : s.time;
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.innerText = t;
                    btn.className = 'p-2 border rounded hover:bg-indigo-50 text-sm';
                    btn.onclick = () => {
                        document.getElementById('res-time').value = t;
                        document.querySelectorAll('.bg-indigo-200').forEach(b => b.classList.remove('bg-indigo-200'));
                        btn.classList.add('bg-indigo-200');
                    };
                    c.appendChild(btn);
                });
            } else {
                c.innerHTML = '<p class="col-span-3 text-center text-gray-400">Sin turnos.</p>';
            }
            
            const f = document.getElementById('reserva-form');
            f.parentNode.insertBefore(c, f);
        });
    }
</script>
{% endblock %}
