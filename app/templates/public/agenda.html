{% extends "base.html" %}
{% block title %}Agenda de {{ professional.name }}{% endblock %}
{% block content %}
<style>
    /* FIX VISUAL TOTAL */
    body { background-color: #f1f5f9 !important; color: #111827 !important; }
    .bg-slate-800, .bg-slate-900 { background-color: #0f172a !important; color: white !important; }
    /* Fuerza inputs y botones visibles */
    input, select, textarea, button { background-color: #ffffff !important; color: #111827 !important; border: 1px solid #d1d5db !important; }
    select { appearance: none; background-image: url("data:image/svg+xml,%23..."); } /* Icono down */
</style>

<div class="min-h-screen flex flex-col items-center justify-center bg-slate-200 p-4">
    <div class="w-full max-w-md bg-white shadow-2xl overflow-hidden mb-4">
        <!-- HEADER -->
        <div class="bg-slate-900 p-10 text-center border-b-4 border-indigo-600">
            <h1 class="text-3xl font-bold text-white tracking-tight">{{ professional.name }}</h1>
        </div>
        
        <div class="p-8 space-y-6 bg-white">
            <form action="{{ url_for('public.agenda', slug=professional.slug) }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wide">Nombre Completo</label>
                    <input type="text" name="name" required class="block w-full px-0 py-3 border-0 border-b-2 border-slate-200 focus:border-indigo-600 focus:ring-0 text-lg transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wide">Email</label>
                    <input type="email" name="email" required class="block w-full px-0 py-3 border-0 border-b-2 border-slate-200 focus:border-indigo-600 focus:ring-0 text-lg transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wide">Teléfono</label>
                    <input type="tel" name="phone" required class="block w-full px-0 py-3 border-0 border-b-2 border-slate-200 focus:border-indigo-600 focus:ring-0 text-lg transition">
                </div>
                
                <!-- SELECT DE FECHAS (CORREGIDO) -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-wide">Día</label>
                    <select name="date" id="date-select" required class="block w-full px-0 py-3 border-0 border-b-2 border-slate-200 focus:border-indigo-600 focus:ring-0 text-lg transition cursor-pointer">
                        <option value="" disabled selected>Seleccionar fecha</option>
                        {% for d in enabled_dates %}
                        <!-- CORRECCIÓN: Usar 'd' directo, no 'd.date' -->
                        <option value="{{ d }}">{{ d|format_date }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- CONTENEDOR DE HORARIOS -->
                <div id="slots-container" class="hidden">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-3 tracking-wide">Horarios Disponibles</label>
                    <div id="slots-grid" class="grid grid-cols-3 gap-2"></div>
                    <input type="hidden" name="time_slot" id="time-slot-input">
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded text-sm font-bold uppercase tracking-widest hover:bg-indigo-700 transition mt-4 shadow-lg disabled:opacity-50" disabled>
                    Confirmar Reserva
                </button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="w-full max-w-md text-center text-xs text-slate-500 mt-auto py-4">
        <p class="font-bold text-slate-600">2026 Copyright - Guillermo Enrique Oyarzo</p>
        <p>Sistemas y Tecnologías - Soluciones para Empresa</p>
        <a href="https://wa.me/5492804685815" target="_blank" class="text-green-600 hover:underline">WhatsApp: +54 9 2804 68-5815</a>
    </div>
</div>

<script>
document.getElementById('date-select').addEventListener('change', function() {
    const date = this.value;
    const slug = "{{ professional.slug }}";
    const container = document.getElementById('slots-container');
    const grid = document.getElementById('slots-grid');
    const submitBtn = document.getElementById('submit-btn');

    // Resetear estado
    grid.innerHTML = '<p class="col-span-3 text-center text-slate-400 text-sm">Consultando...</p>';
    container.classList.remove('hidden');
    submitBtn.disabled = true;
    document.getElementById('time-slot-input').value = "";

    // VALIDACIÓN
    if(!date){
        grid.innerHTML = '<p class="col-span-3 text-center text-red-500 text-sm">Error: Fecha no válida.</p>';
        return;
    }

    fetch(`/agenda/get-slots/${slug}/${date}`)
        .then(response => {
            if (!response.ok) { throw new Error('Error de servidor'); }
            return response.json();
        })
        .then(data => {
            grid.innerHTML = '';
            if(data.slots && data.slots.length > 0){
                data.slots.forEach(slot => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    // Acepta string u objeto
                    const timeText = (typeof slot === 'string') ? slot : slot.time;
                    
                    btn.innerText = timeText;
                    btn.className = 'border border-slate-300 rounded py-2 text-sm font-medium hover:bg-indigo-50 hover:border-indigo-500 hover:text-indigo-600 transition';
                    
                    btn.onclick = function() {
                        document.querySelectorAll('#slots-grid button').forEach(b => {
                            b.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                            b.classList.add('border-slate-300');
                        });
                        this.classList.remove('border-slate-300');
                        this.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                        document.getElementById('time-slot-input').value = timeText;
                        submitBtn.disabled = false;
                    };
                    grid.appendChild(btn);
                });
            } else {
                let msg = data.message || 'Sin horarios disponibles.';
                grid.innerHTML = `<div class="col-span-3"><p class="text-center text-red-500 text-sm">${msg}</p></div>`;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            grid.innerHTML = '<p class="col-span-3 text-center text-red-500 text-sm">Error al cargar. Intente de nuevo.</p>';
        });
});
</script>
{% endblock %}
