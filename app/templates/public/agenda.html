{% extends "base.html" %}
{% block content %}
<style>
    /* FUERZA BRUTA PARA SOLUCIONAR VISIBILIDAD */
    .safe-zone { background-color: white !important; color: #1e293b !important; }
    .safe-zone input, .safe-zone select { background-color: #f8fafc !important; color: #1e293b !important; border: 1px solid #cbd5e1 !important; }
    .safe-zone button.btn-primary { background-color: #4f46e5 !important; color: white !important; border: none !important; }
    .safe-zone button.btn-slot { background-color: white !important; color: #1e293b !important; border: 1px solid #cbd5e1 !important; }
    .safe-zone button.btn-slot:hover { background-color: #e0e7ff !important; }
    .safe-zone button.btn-active { background-color: #c7d2fe !important; border-color: #4f46e5 !important; }
</style>

<div class="bg-slate-800 text-white py-12 text-center">
    <h1 class="text-4xl font-bold">{{ professional.name }}</h1>
    <p class="text-slate-300 mt-2">Selecciona un día para ver horarios.</p>
</div>

<div class="safe-zone py-10 min-h-screen">
    <div class="container mx-auto px-6 grid md:grid-cols-3 gap-6">
        {% for d in enabled_dates %}
        <a href="{{ url_for('public.agenda', slug=professional.slug) }}?d={{ d }}" 
           class="bg-white p-6 rounded-xl shadow hover:shadow-xl transition block text-center border border-gray-200">
            <h2 class="text-xl font-bold">{{ d.strftime('%d/%m') }}</h2>
            <p class="text-slate-500 text-sm mt-1">{{ d.strftime('%A') }}</p>
            <div class="mt-4 text-indigo-600 font-semibold text-sm">Ver turnos →</div>
        </a>
        {% else %}
        <p class="col-span-3 text-center p-10 text-gray-500">No hay fechas disponibles.</p>
        {% endfor %}
    </div>

    <form id="reserva-form" method="POST" class="hidden max-w-md mx-auto p-8 rounded-xl shadow-lg mt-6 border border-gray-200">
        <input type="hidden" name="date" id="res-date">
        <input type="hidden" name="time_slot" id="res-time">
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Reservar Turno</h2>
        <div class="space-y-3 mb-4">
            <input type="text" name="name" placeholder="Nombre Completo" required class="w-full p-3 rounded">
            <input type="email" name="email" placeholder="Email" required class="w-full p-3 rounded">
            <input type="tel" name="phone" placeholder="Teléfono" required class="w-full p-3 rounded">
        </div>
        <button type="submit" class="btn-primary w-full py-3 rounded font-bold text-lg">Confirmar Reserva</button>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const d = params.get('d');
    if(d) loadSlots(d);

    function loadSlots(dateStr) {
        document.getElementById('reserva-form').classList.remove('hidden');
        document.getElementById('res-date').value = dateStr;
        
        // Concatenación simple para evitar errores de sintaxis en PowerShell
        var url = '/agenda/get-slots/{{ professional.slug }}/' + dateStr;
        
        fetch(url)
        .then(r => r.json())
        .then(data => {
            const c = document.createElement('div');
            c.className = 'grid grid-cols-3 gap-2 mb-4 p-4 rounded-lg bg-gray-50';
            
            if(data.slots && data.slots.length > 0){
                data.slots.forEach(s => {
                    let t = typeof s === 'string' ? s : s.time;
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.innerText = t;
                    btn.className = 'btn-slot p-3 rounded text-sm font-medium shadow-sm';
                    btn.onclick = () => {
                        document.getElementById('res-time').value = t;
                        document.querySelectorAll('.btn-active').forEach(b => b.classList.remove('btn-active'));
                        btn.classList.add('btn-active');
                    };
                    c.appendChild(btn);
                });
            } else {
                c.innerHTML = '<p class="col-span-3 text-center p-4 text-gray-500">No hay turnos disponibles.</p>';
            }
            
            const f = document.getElementById('reserva-form');
            f.insertBefore(c, f.firstChild.nextSibling);
        }).catch(err => {
            alert('Error al cargar turnos. Por favor intente recargar la página.');
            console.error(err);
        });
    }
</script>
{% endblock %}
